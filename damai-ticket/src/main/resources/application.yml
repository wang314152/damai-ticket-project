server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/damai;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: true
    
  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  http:
    encoding:
      charset: UTF-8
      enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.damai.damaiticket: info
