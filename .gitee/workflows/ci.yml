# Gitee 流水线配置
# 官方文档: https://gitee.com/help/articles/4192

stages:
  - build

# 缓存配置
cache:
  key: ${CI_COMMIT_REF_NAME}
  paths:
    - .m2/repository
    - damai-ticket-frontend/node_modules/

# Java 后端构建
build-backend:
  stage: build
  script:
    - echo "=== 大麦网票务系统 CI构建 ==="
    - echo "当前目录: $(pwd)"
    - ls -la
    - echo "构建后端..."
    - cd damai-ticket
    - mvn clean package -DskipTests
    - echo "后端构建完成 ✅"
  only:
    - master
    - main

# Node.js 前端构建
build-frontend:
  stage: build
  script:
    - echo "构建前端..."
    - cd damai-ticket-frontend
    - npm config set registry https://registry.npmmirror.com
    - npm install
    - npm run build
    - echo "前端构建完成 ✅"
  only:
    - master
    - main
