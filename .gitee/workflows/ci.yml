# Gitee 流水线配置
# 官方文档: https://gitee.com/help/articles/4192

stages:
  - build

# 全局缓存配置
cache:
  key: dependency
  paths:
    - .m2/repository
    - node_modules

# Java 后端构建
build-backend:
  stage: build
  cache:
    - .m2/repository
  script:
    - echo "=== 构建后端 ==="
    - ls -la
    - cd damai-ticket && mvn clean package -DskipTests && cd ..
    - echo "后端构建成功"
  only:
    - master

# Node.js 前端构建
build-frontend:
  stage: build
  script:
    - echo "=== 构建前端 ==="
    - cd damai-ticket-frontend
    - npm config set registry https://registry.npmmirror.com
    - npm install
    - npm run build
    - echo "前端构建成功"
  only:
    - master
