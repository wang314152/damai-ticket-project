stages:
  - build

build:
  stage: build
  tags:
    - gitee-ubuntu
  script:
    - echo "=== 大麦网票务系统 CI ==="
    - ls -la
    - echo "构建后端..."
    - cd damai-ticket && mvn clean package -DskipTests
    - echo "构建前端..."
    - cd ../damai-ticket-frontend && npm install && npm run build
    - echo "=== 构建完成 ==="
