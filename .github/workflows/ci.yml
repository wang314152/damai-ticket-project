name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Maven 缓存加速
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Backend
        run: |
          cd damai-ticket
          mvn clean package -DskipTests -q
          echo "✅ 后端构建完成"

      # npm 缓存加速
      - name: Cache npm packages
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Build Frontend
        run: |
          cd damai-ticket-frontend
          npm install --registry https://registry.npmmirror.com
          npm run build
          echo "✅ 前端构建完成"

      - name: Build Success Report
        run: |
          echo "=================================="
          echo "  大麦网票务系统 - 构建成功 ✅"
          echo "=================================="
          echo "后端: Spring Boot 2.7.18 ✅"
          echo "前端: Vue 3 + Vite ✅"
          echo "=================================="
