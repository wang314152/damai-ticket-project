name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build Backend
        run: |
          cd damai-ticket
          mvn clean package -DskipTests

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build Frontend
        run: |
          cd damai-ticket-frontend
          npm install
          npm run build

      - name: Build Success Report
        run: |
          echo "=================================="
          echo "  大麦网票务系统 - 构建成功"
          echo "=================================="
          echo "后端构建: 成功"
          echo "前端构建: 成功"
          echo "=================================="
